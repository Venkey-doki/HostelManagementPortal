services:
  db:
    image: postgres:16-alpine
    container_name: hostel_db
    environment:
      POSTGRES_DB: hostel_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hostel_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hostel_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    container_name: hostel_api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hostel_mgmt?schema=public
      REDIS_URL: redis://redis:6379
      PORT: "4000"
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  worker:
    build:
      context: ./backend
    container_name: hostel_worker
    command: ["npm", "run", "worker:start"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hostel_mgmt?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hostel_frontend
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pg_data:
  redis_data:
